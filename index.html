<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini App</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: #0f0f0f;
  color: white;
}

.container {
  padding: 16px;
  max-width: 500px;
  margin: auto;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
  font-size: 18px;
}

/* блоки */
.block {
  width: 100%;
  height: 60px;
  border-radius: 14px;
  background: #1f1f1f;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-bottom: 12px;
  font-size: 15px;
}

.block:active {
  background: #007b0e;
}

/* иконки */
.icon {
  width: 18px;
  height: 18px;
  stroke: #888;
  stroke-width: 2;
  fill: none;
}

/* текст под */
.sub {
  text-align: center;
  color: #888;
  font-size: 13px;
  margin-top: -6px;
  margin-bottom: 12px;
}

/* поля */
.input {
  width: 100%;
  height: 50px;
  padding: 0 12px;
  margin-bottom: 12px;
  border-radius: 12px;
  border: none;
  background: #1a1a1a;
  color: white;
  font-size: 15px;
}

/* select */
.select {
  appearance: none;
  background-image: url("data:image/svg+xml;utf8,<svg stroke='gray' fill='none' stroke-width='2' viewBox='0 0 24 24' width='12'><polyline points='6 9 12 15 18 9'/></svg>");
  background-repeat: no-repeat;
  background-position: right 12px center;
}

/* дата */
.fake {
  display: flex;
  align-items: center;
  color: #aaa;
}

.hidden {
  position: absolute;
  opacity: 0;
}

/* кнопки */
.btn {
  width: 100%;
  height: 50px;
  border-radius: 12px;
  background: #1f1f1f;
  color: white;
  border: none;
  margin-top: 10px;
  font-size: 15px;
}

/* disabled */
.btn.disabled {
  opacity: 0.4;
}

.note {
  margin-top: 10px;
  color: #888;
  font-size: 13px;
  text-align: center;
}
</style>
</head>

<body>
<div class="container">

<!-- MENU -->
<div id="menu">
  <h2>Меню</h2>

  <div class="block" onclick="show('form')">Записаться</div>

  <div class="block" onclick="show('faq')">
    ?
    FAQ
  </div>

  <div class="block" onclick="openChat()">Консультация</div>

  <div class="sub">Если Вы не нашли ответ в разделе FAQ, напишите мне</div>

  <div style="height:20px;"></div>

  <div class="block" onclick="openInstagram()">Instagram</div>
</div>

<!-- FORM -->
<div id="form" style="display:none;">
  <h2>Записаться</h2>

  <input class="input" id="name" placeholder="Имя" oninput="checkForm()">
  <input class="input" id="contact" placeholder="Telegram или номер" oninput="checkForm()">

  <select class="input select" id="training" onchange="checkForm()">
    <option value="">Выберите тренировку</option>
    <option>Пилатес</option>
    <option>Стретчинг</option>
    <option>Акро</option>
  </select>

  <select class="input select" id="type" onchange="checkForm()">
    <option value="">Тип</option>
    <option>Онлайн</option>
    <option>Оффлайн</option>
  </select>

  <div class="input fake" onclick="openDate()">
    <span id="dateText">Выберите день</span>
  </div>

  <div class="input fake" onclick="openTime()">
    <span id="timeText">Выберите время</span>
  </div>

  <input type="date" id="date" class="hidden">
  <input type="time" id="time" class="hidden">

  <button id="submitBtn" class="btn disabled" onclick="sendData()">Отправить</button>
  <button class="btn" onclick="back()">Назад</button>

  <div class="note">После отправления заявки с Вами свяжутся!</div>
</div>

<!-- FAQ -->
<div id="faq" style="display:none;">
  <h2>FAQ</h2>
  <div class="note">Скоро будет информация</div>
  <button class="btn" onclick="back()">Назад</button>
</div>

</div>

<script>
function show(id){
  menu.style.display="none";
  document.getElementById(id).style.display="block";
}

function back(){
  menu.style.display="block";
  form.style.display="none";
  faq.style.display="none";
}

function openChat(){ window.open("https://t.me/niginacoach"); }
function openInstagram(){ window.open("https://www.instagram.com/nigina.coach"); }

function openDate(){ date.click(); }
function openTime(){ time.click(); }

date.onchange = () => {
  if(date.value){
    const d=new Date(date.value);
    dateText.innerText = d.toLocaleDateString("ru-RU",{day:"numeric",month:"long"});
    checkForm();
  }
};

time.onchange = () => {
  if(time.value){
    timeText.innerText = time.value;
    checkForm();
  }
};

/* проверка */
function checkForm(){
  const valid =
    name.value &&
    contact.value &&
    training.value &&
    type.value &&
    date.value &&
    time.value;

  if(valid){
    submitBtn.classList.remove("disabled");
  } else {
    submitBtn.classList.add("disabled");
  }
}

/* отправка */
function sendData(){
  if(submitBtn.classList.contains("disabled")) return;

  const text =
`Новая заявка:
Имя: ${name.value}
Контакт: ${contact.value}
Тренировка: ${training.value}
Тип: ${type.value}
Дата: ${date.value}
Время: ${time.value}`;

  window.open(`https://t.me/timurfaizievvv?text=${encodeURIComponent(text)}`);
}
</script>

</body>
</html>
