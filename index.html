<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nigina Coach</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  color: white;
  background: radial-gradient(circle at top right, #5c7fa3, #0e1a2b 60%);
}

/* контейнер */
.container {
  padding: 16px;
  max-width: 500px;
  margin: auto;
}

/* заголовок */
.header {
  margin-bottom: 20px;
}

.title {
  font-size: 22px;
  font-weight: 600;
}

.subtitle {
  color: #aaa;
  font-size: 13px;
}

/* карточки */
.card {
  border-radius: 18px;
  padding: 16px;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  backdrop-filter: blur(20px);
  background: linear-gradient(135deg, rgba(105,103,251,0.4), rgba(14,26,47,0.4));
  border: 1px solid rgba(255,255,255,0.08);
  cursor: pointer;
  transition: 0.2s;
}

.card:active {
  transform: scale(0.98);
}

.card.green {
  background: linear-gradient(135deg, rgba(200,249,4,0.4), rgba(14,26,47,0.4));
}

.card.blue {
  background: linear-gradient(135deg, rgba(105,103,251,0.4), rgba(14,26,47,0.4));
}

.card-content {
  display: flex;
  flex-direction: column;
}

.card-title {
  font-size: 16px;
  font-weight: 500;
}

.card-sub {
  font-size: 13px;
  color: #ccc;
  margin-top: 4px;
}

/* форма */
.input {
  width: 100%;
  height: 50px;
  border-radius: 14px;
  border: none;
  padding: 0 12px;
  margin-bottom: 12px;
  background: rgba(255,255,255,0.05);
  color: white;
}

/* select */
.select {
  color: #aaa;
}

.select.filled {
  color: white;
}

/* дата/время */
.fake {
  height: 50px;
  display: flex;
  align-items: center;
  padding: 0 12px;
  border-radius: 14px;
  background: rgba(255,255,255,0.05);
  margin-bottom: 12px;
  position: relative;
}

.hidden {
  position: absolute;
  inset: 0;
  opacity: 0.01;
}

/* кнопка */
.button {
  width: 100%;
  height: 50px;
  border-radius: 14px;
  border: none;
  margin-top: 10px;
  font-size: 15px;
  color: white;
  background: linear-gradient(90deg, #6967FB, #C8F904);
}

.button.disabled {
  opacity: 0.4;
  pointer-events: none;
}

.note {
  text-align: center;
  font-size: 13px;
  color: #aaa;
  margin-top: 10px;
}
</style>
</head>

<body>
<div class="container">

<div id="menu">
  <div class="header">
    <div class="title">Nigina Coach</div>
    <div class="subtitle">мини-приложение</div>
  </div>

  <div class="card blue" onclick="show('form')">
    <div class="card-content">
      <div class="card-title">Записаться</div>
      <div class="card-sub">Запись на тренировку</div>
    </div>
  </div>

  <div class="card blue" onclick="show('faq')">
    <div class="card-content">
      <div class="card-title">FAQ</div>
      <div class="card-sub">Ответы на вопросы</div>
    </div>
  </div>

  <div class="card" onclick="openChat()">
    <div class="card-content">
      <div class="card-title">Консультация</div>
      <div class="card-sub">Написать в Telegram</div>
    </div>
  </div>

  <div class="card green" onclick="openInstagram()">
    <div class="card-content">
      <div class="card-title">Instagram</div>
      <div class="card-sub">Следите за мной</div>
    </div>
  </div>
</div>

<!-- форма -->
<div id="form" style="display:none;">

  <input class="input" id="name" placeholder="Имя">
  <input class="input" id="contact" placeholder="Telegram или номер">

  <select class="input select" id="training">
    <option value="" disabled selected>Тренировка</option>
    <option>Пилатес</option>
    <option>Стретчинг</option>
    <option>Акро</option>
  </select>

  <select class="input select" id="type">
    <option value="" disabled selected>Тип</option>
    <option>Онлайн</option>
    <option>Оффлайн</option>
  </select>

  <div class="fake">
    <span id="dateText">Выберите день</span>
    <input type="date" id="date" class="hidden">
  </div>

  <div class="fake">
    <span id="timeText">Выберите время</span>
    <input type="time" id="time" class="hidden">
  </div>

  <button id="submitBtn" class="button disabled">Отправить</button>
  <button class="button" onclick="back()">Назад</button>

  <div class="note">После отправления заявки с Вами свяжутся</div>
</div>

<div id="faq" style="display:none;">
  <div class="note">Скоро будет информация</div>
  <button class="button" onclick="back()">Назад</button>
</div>

</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const nameInput = document.getElementById("name");
const contactInput = document.getElementById("contact");
const training = document.getElementById("training");
const type = document.getElementById("type");
const date = document.getElementById("date");
const time = document.getElementById("time");
const submitBtn = document.getElementById("submitBtn");
const dateText = document.getElementById("dateText");
const timeText = document.getElementById("timeText");

function show(id){
  document.getElementById("menu").style.display="none";
  document.getElementById(id).style.display="block";
}

function back(){
  document.getElementById("menu").style.display="block";
  document.getElementById("form").style.display="none";
  document.getElementById("faq").style.display="none";
}

function openChat(){ tg.openTelegramLink("https://t.me/niginacoach"); }
function openInstagram(){ window.open("https://instagram.com"); }

training.onchange = type.onchange = checkForm;
nameInput.oninput = contactInput.oninput = checkForm;

date.onchange = () => {
  const d = new Date(date.value);
  dateText.innerText = d.getDate() + " число";
  checkForm();
};

time.onchange = () => {
  timeText.innerText = time.value;
  checkForm();
};

function checkForm(){
  const valid =
    nameInput.value &&
    contactInput.value.length >= 5 &&
    training.value &&
    type.value &&
    date.value &&
    time.value;

  submitBtn.classList.toggle("disabled", !valid);
}

submitBtn.onclick = () => {
  const data = {
    name: nameInput.value,
    contact: contactInput.value,
    training: training.value,
    type: type.value,
    date: dateText.innerText,
    time: timeText.innerText
  };

  tg.sendData(JSON.stringify(data));
};
</script>

</body>
</html>
