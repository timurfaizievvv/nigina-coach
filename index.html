<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini App</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0f0f0f;
  color: white;
}

.container {
  padding: 16px;
  max-width: 500px;
  margin: auto;
}

@media (max-width: 600px) {
  .container { padding: 16px 14px; }
}

h2 { text-align: center; margin-bottom: 20px; }

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

button {
  padding: 18px;
  border: none;
  border-radius: 16px;
  background: #1f1f1f;
  color: white;
  font-size: 16px;
  transition: 0.2s;
}

button:active {
  background: #007b0e;
  transform: scale(0.97);
}

input, select {
  width: 100%;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 12px;
  border: none;
  background: #1a1a1a;
  color: white;
  font-size: 16px;
  appearance: none;
}

.fake-input {
  width: 100%;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 12px;
  background: #1a1a1a;
  color: #aaa;
}

.hidden-input {
  position: absolute;
  opacity: 0;
  pointer-events: none;
}

/* ПК */
@media (min-width: 768px) {
  .fake-input { display: none; }
  .hidden-input {
    position: static;
    opacity: 1;
    pointer-events: auto;
    margin-bottom: 12px;
  }
}

/* СЛОТЫ */
.slots {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.slot {
  padding: 12px;
  text-align: center;
  border-radius: 10px;
  background: #1f1f1f;
}

.slot.active { background: #007b0e; }
.slot.disabled { background: #333; opacity: 0.4; }

.full { width: 100%; margin-top: 10px; }
.card { margin-bottom: 12px; }
</style>
</head>

<body>
<div class="container">

<!-- MENU -->
<div id="menu">
  <h2>Меню</h2>
  <div class="grid">
    <button onclick="show('schedule')">Расписание</button>
    <button onclick="openChat()">Консультация</button>
    <button onclick="show('contacts')">Контакты</button>
    <button onclick="show('form')">Записаться</button>
  </div>
</div>

<!-- SCHEDULE -->
<div id="schedule" style="display:none;">
  <h2>Расписание</h2>

  <input type="date" id="scheduleDate">

  <div class="slots" id="slots"></div>

  <button class="full" onclick="back()">Назад</button>
</div>

<!-- CONTACTS -->
<div id="contacts" style="display:none;">
  <h2>Контакты</h2>
  <button class="full" onclick="openLink('https://www.instagram.com/nigina.coach')">Instagram</button>
  <button class="full" onclick="openLink('https://t.me/niginacoach')">Telegram</button>
  <button class="full" onclick="openLink('mailto:niginacoach@gmail.com')">Gmail</button>
  <button class="full" onclick="back()">Назад</button>
</div>

<!-- FORM -->
<div id="form" style="display:none;">
  <h2>Записаться</h2>

  <input id="name" placeholder="Имя">
  <input id="username" placeholder="Ваш Telegram (@username)">

  <select id="training">
    <option>Пилатес</option>
    <option>Стретчинг</option>
    <option>Акро</option>
  </select>

  <select id="type">
    <option>Оффлайн</option>
    <option>Онлайн</option>
  </select>

  <div class="fake-input" onclick="openDate()">
    <span id="dateText">Выберите день</span>
  </div>

  <div class="fake-input" onclick="openTime()">
    <span id="timeText">Выберите время</span>
  </div>

  <input type="date" id="date" class="hidden-input">
  <input type="time" id="time" class="hidden-input">

  <button class="full" onclick="sendData()">Отправить</button>
  <button class="full" onclick="back()">Назад</button>
</div>

</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const TIMES = ["12:00","13:00","14:00","15:00","16:00","17:00","18:00"];
let selectedDate = null;

/* навигация */
function show(id) {
  document.getElementById("menu").style.display = "none";
  document.getElementById(id).style.display = "block";
}

function back() {
  document.getElementById("menu").style.display = "block";
  document.getElementById("schedule").style.display = "none";
  document.getElementById("contacts").style.display = "none";
  document.getElementById("form").style.display = "none";
}

function openChat() { window.open("https://t.me/niginacoach"); }
function openLink(url) { window.open(url); }

/* хранение */
function getBusy() {
  return JSON.parse(localStorage.getItem("busy") || "{}");
}

function saveBusy(data) {
  localStorage.setItem("busy", JSON.stringify(data));
}

/* рендер слотов */
function renderSlots(date) {
  const container = document.getElementById("slots");
  container.innerHTML = "";

  const busy = getBusy();
  const dayBusy = busy[date] || [];

  TIMES.forEach(time => {
    const div = document.createElement("div");
    div.className = "slot";
    div.innerText = time;

    if (dayBusy.includes(time)) {
      div.classList.add("disabled");
    } else {
      div.onclick = () => {
        document.getElementById("date").value = date;
        document.getElementById("time").value = time;
        document.getElementById("dateText").innerText = date;
        document.getElementById("timeText").innerText = time;
        show("form");
      };
    }

    container.appendChild(div);
  });
}

/* выбор даты в расписании */
document.getElementById("scheduleDate").addEventListener("change", function() {
  selectedDate = this.value;
  renderSlots(selectedDate);
});

/* мобилка */
function openDate() { document.getElementById("date").click(); }
function openTime() { document.getElementById("time").click(); }

/* обновление текста */
document.getElementById("date").addEventListener("change", function() {
  document.getElementById("dateText").innerText = this.value;
});

document.getElementById("time").addEventListener("change", function() {
  document.getElementById("timeText").innerText = this.value;
});

/* отправка */
function sendData() {
  const name = document.getElementById("name").value;
  const training = document.getElementById("training").value;
  const type = document.getElementById("type").value;
  const date = document.getElementById("date").value;
  const time = document.getElementById("time").value;
  const username = document.getElementById("username").value;

  const busy = getBusy();
  if (!busy[date]) busy[date] = [];
  busy[date].push(time);
  saveBusy(busy);

  const text =
`Новая заявка:
Имя: ${name}
Тренировка: ${training}
Тип: ${type}
Дата: ${date}
Время: ${time}
Telegram: ${username}`;

  window.open(`https://t.me/timurfaizievvv?text=${encodeURIComponent(text)}`);
}
</script>

</body>
</html>
