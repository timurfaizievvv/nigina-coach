<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Mini App</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
:root {
  --bg: #0f0f10;
  --card: #1c1c1e;
  --text: #ffffff;
  --sub: #8e8e93;
  --accent: #ffffff;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  padding: 20px;
}

.screen {
  display: none;
}

.active {
  display: block;
}

.title {
  text-align: center;
  font-size: 20px;
  margin-bottom: 25px;
  font-weight: 600;
}

.block {
  background: var(--card);
  padding: 14px;
  border-radius: 12px;
  margin-bottom: 12px;
}

input, select {
  width: 100%;
  background: transparent;
  border: none;
  color: var(--text);
  font-size: 15px;
  outline: none;
}

select {
  appearance: none;
  background-image: url("data:image/svg+xml;utf8,<svg fill='white' height='20' viewBox='0 0 24 24' width='20'><path d='M7 10l5 5 5-5z'/></svg>");
  background-repeat: no-repeat;
  background-position: right center;
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-size: 15px;
  margin-top: 10px;
}

.primary {
  background: white;
  color: black;
}

.disabled {
  background: #2c2c2e;
  color: #6b6b6b;
}

.secondary {
  background: transparent;
  color: white;
  border: 1px solid #2c2c2e;
}

.note {
  font-size: 12px;
  color: var(--sub);
  text-align: center;
  margin-top: 8px;
}

.menu-btn {
  text-align: center;
  padding: 16px;
  background: var(--card);
  border-radius: 12px;
  margin-bottom: 12px;
  font-size: 16px;
}

.spacer {
  height: 20px;
}
</style>
</head>

<body>

<!-- ГЛАВНАЯ -->
<div id="home" class="screen active">
  <div class="title">Главная страница</div>

  <div class="menu-btn" onclick="openScreen('form')">Записаться</div>
  <div class="menu-btn" onclick="openScreen('faq')">FAQ</div>
  <div class="menu-btn" onclick="openConsult()">Консультация</div>

  <div class="spacer"></div>

  <div class="menu-btn" onclick="openInstagram()">Instagram</div>
</div>

<!-- ФОРМА -->
<div id="form" class="screen">
  <div class="title">Форма заполнения заявки</div>

  <div class="block">
    <input id="name" placeholder="Введите имя">
  </div>

  <div class="block">
    <input id="contact" placeholder="Введите контакты">
  </div>

  <div class="block">
    <select id="training">
      <option value="">Выберите тренировку</option>
      <option>Пилатес</option>
      <option>Акро</option>
      <option>Стретчинг</option>
    </select>
  </div>

  <div class="block">
    <select id="format">
      <option value="">Формат тренировки</option>
      <option>Онлайн</option>
      <option>Оффлайн</option>
      <option>Выезд на дому</option>
    </select>
  </div>

  <div class="block">
    <input type="date" id="date">
  </div>

  <div class="block">
    <input type="time" id="time">
  </div>

  <div class="spacer"></div>

  <button id="submitBtn" class="disabled" onclick="sendForm()">Заполните форму</button>

  <button class="secondary" onclick="openScreen('home')">Назад</button>

  <div class="note">
    С Вами свяжутся после проверки Вашей заявки.
  </div>
</div>

<!-- FAQ -->
<div id="faq" class="screen">
  <div class="title">FAQ</div>

  <div class="note" style="margin-top:20px;">
    В ближайшее время тут будут ответы на вопросы
  </div>

  <button class="secondary" onclick="openScreen('home')" style="margin-top:20px;">Назад</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

function openScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function openConsult() {
  window.open("https://t.me/niginacoach", "_blank");
}

function openInstagram() {
  window.open("https://www.instagram.com/nigina.coach", "_blank");
}

// ВАЛИДАЦИЯ
const fields = ["name", "contact", "training", "format", "date", "time"];

fields.forEach(id => {
  document.getElementById(id).addEventListener("input", validate);
  document.getElementById(id).addEventListener("change", validate);
});

function validate() {
  const filled = fields.every(id => document.getElementById(id).value);

  const btn = document.getElementById("submitBtn");

  if (filled) {
    btn.classList.remove("disabled");
    btn.classList.add("primary");
    btn.innerText = "Отправить";
  } else {
    btn.classList.remove("primary");
    btn.classList.add("disabled");
    btn.innerText = "Заполните форму";
  }
}

// ОТПРАВКА
function sendForm() {
  const filled = fields.every(id => document.getElementById(id).value);
  if (!filled) return;

  const data = {
    name: name.value,
    contact: contact.value,
    training: training.value,
    format: format.value,
    date: date.value,
    time: time.value
  };

  tg.sendData(JSON.stringify(data));
}
</script>

</body>
</html>
