<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nigina Coach</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
:root{
  --bg1:#0E1A2F;
  --bg2:#1B2C48;
  --accent1:#6967FB;
  --accent2:#C8F904;
  --text:#FFFFFF;
  --sub:#A0A7B5;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  color:var(--text);
  background: linear-gradient(160deg, var(--bg1), var(--bg2));
}

.container{
  max-width:500px;
  margin:auto;
  padding:20px 16px 30px;
}

.title{
  font-size:22px;
  font-weight:600;
  margin-bottom:4px;
}

.subtitle{
  font-size:13px;
  color:var(--sub);
  margin-bottom:20px;
}

.card{
  padding:16px;
  border-radius:16px;
  margin-bottom:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background: rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.06);
  backdrop-filter: blur(12px);
  transition:.15s;
}

.card:active{
  transform:scale(0.98);
}

.card-title{
  font-size:15px;
  font-weight:500;
}

.card-sub{
  font-size:13px;
  color:var(--sub);
  margin-top:2px;
}

.input{
  width:100%;
  height:48px;
  border-radius:12px;
  border:none;
  padding:0 12px;
  margin-bottom:10px;
  background: rgba(255,255,255,0.04);
  color:var(--text);
  font-size:14px;
}

select{
  appearance:none;
  color:var(--sub);
}

select.filled{
  color:var(--text);
}

.fake{
  height:48px;
  border-radius:12px;
  background: rgba(255,255,255,0.04);
  display:flex;
  align-items:center;
  padding:0 12px;
  margin-bottom:10px;
  position:relative;
  font-size:14px;
  color:var(--sub);
}

.hidden{
  position:absolute;
  inset:0;
  opacity:0.01;
}

.button{
  width:100%;
  height:48px;
  border:none;
  border-radius:12px;
  font-size:14px;
}

.button.primary{
  background: linear-gradient(90deg, var(--accent1), var(--accent2));
  color:#000;
  font-weight:600;
}

.button.secondary{
  background: rgba(255,255,255,0.06);
  color:var(--text);
  font-weight:500;
  margin-top:8px;
}

.button.disabled{
  opacity:.4;
  pointer-events:none;
}

.spacer-lg{
  height:20px;
}

.note{
  margin-top:12px;
  font-size:12px;
  color:var(--sub);
  text-align:center;
}
</style>
</head>

<body>
<div class="container">

<div id="menu">
  <div class="title">Nigina Coach</div>
  <div class="subtitle">мини-приложение</div>

  <div class="card" onclick="show('form')">
    <div>
      <div class="card-title">Записаться</div>
      <div class="card-sub">Запись на тренировку</div>
    </div>
  </div>

  <div class="card" onclick="show('faq')">
    <div>
      <div class="card-title">FAQ</div>
      <div class="card-sub">Ответы на вопросы</div>
    </div>
  </div>

  <div class="card" onclick="openChat()">
    <div>
      <div class="card-title">Консультация</div>
      <div class="card-sub">Написать в Telegram</div>
    </div>
  </div>

  <div class="card" onclick="openInstagram()">
    <div>
      <div class="card-title">Instagram</div>
      <div class="card-sub">Следите за мной</div>
    </div>
  </div>
</div>

<div id="form" style="display:none;">

  <input class="input" id="name" placeholder="Имя">
  <input class="input" id="contact" placeholder="Telegram или номер">

  <select class="input" id="training">
    <option value="" disabled selected>Тренировка</option>
    <option>Пилатес</option>
    <option>Стретчинг</option>
    <option>Акро</option>
  </select>

  <select class="input" id="type">
    <option value="" disabled selected>Тип</option>
    <option>Онлайн</option>
    <option>Оффлайн</option>
  </select>

  <div class="fake">
    <span id="dateText">Выберите день</span>
    <input type="date" id="date" class="hidden">
  </div>

  <div class="fake">
    <span id="timeText">Выберите время</span>
    <input type="time" id="time" class="hidden">
  </div>

  <!-- двойной отступ -->
  <div class="spacer-lg"></div>

  <button id="submitBtn" class="button primary disabled">Отправить</button>
  <button class="button secondary" onclick="back()">Назад</button>

  <div class="note">После отправки заявки с вами свяжутся</div>
</div>

<div id="faq" style="display:none;">
  <div class="note">Скоро будет информация</div>
  <button class="button secondary" onclick="back()">Назад</button>
</div>

</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const nameInput = document.getElementById("name");
const contactInput = document.getElementById("contact");
const training = document.getElementById("training");
const type = document.getElementById("type");
const date = document.getElementById("date");
const time = document.getElementById("time");
const submitBtn = document.getElementById("submitBtn");
const dateText = document.getElementById("dateText");
const timeText = document.getElementById("timeText");

function show(id){
  document.getElementById("menu").style.display="none";
  document.getElementById(id).style.display="block";
}

function back(){
  document.getElementById("menu").style.display="block";
  document.getElementById("form").style.display="none";
  document.getElementById("faq").style.display="none";
}

function openChat(){ tg.openTelegramLink("https://t.me/niginacoach"); }
function openInstagram(){ window.open("https://instagram.com"); }

[training,type].forEach(el=>{
  el.onchange=()=>{
    if(el.value) el.classList.add("filled");
    checkForm();
  }
});

date.onchange=()=>{
  const d=new Date(date.value);
  const m=["янв","фев","мар","апр","май","июн","июл","авг","сен","окт","ноя","дек"];
  dateText.innerText=`${d.getDate()} ${m[d.getMonth()]}`;
  dateText.style.color="white";
  checkForm();
};

time.onchange=()=>{
  timeText.innerText=time.value;
  timeText.style.color="white";
  checkForm();
};

[nameInput,contactInput].forEach(el=>{
  el.oninput=checkForm;
});

function checkForm(){
  const valid=
    nameInput.value &&
    contactInput.value.length>=5 &&
    training.value &&
    type.value &&
    date.value &&
    time.value;

  submitBtn.classList.toggle("disabled",!valid);
}

submitBtn.onclick=()=>{
  tg.sendData(JSON.stringify({
    name:nameInput.value,
    contact:contactInput.value,
    training:training.value,
    type:type.value,
    date:dateText.innerText,
    time:timeText.innerText
  }));
};
</script>

</body>
</html>
