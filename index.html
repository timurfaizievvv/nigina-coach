<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini App</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0f0f0f;
  color: white;
}

.container {
  padding: 16px;
  max-width: 500px;
  margin: auto;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
  font-size: 18px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

button {
  width: 100%;
  height: 60px;
  border: none;
  border-radius: 14px;
  background: #1f1f1f;
  color: white;
  font-size: 15px;
}

button:active {
  background: #007b0e;
}

/* ПОЛЯ */
.input {
  width: 100%;
  height: 50px;
  padding: 0 12px;
  margin-bottom: 12px;
  border-radius: 12px;
  border: none;
  background: #1a1a1a;
  color: white;
  font-size: 15px;
}

/* SELECT С КАСТОМ СТРЕЛКОЙ */
.select {
  appearance: none;
  -webkit-appearance: none;
  background-image: url("data:image/svg+xml;utf8,<svg fill='white' height='10' viewBox='0 0 24 24' width='10' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/></svg>");
  background-repeat: no-repeat;
  background-position: right 12px center;
}

/* FAKE */
.fake {
  display: flex;
  align-items: center;
}

/* скрытые input (НО кликабельные) */
.hidden {
  position: absolute;
  opacity: 0;
  width: 100%;
  height: 50px;
}

/* кнопки */
.full {
  width: 100%;
  height: 50px;
  margin-top: 10px;
}

.note {
  margin-top: 10px;
  color: #888;
  font-size: 13px;
  text-align: center;
}
</style>
</head>

<body>
<div class="container">

<div id="menu">
  <h2>Меню</h2>
  <div class="grid">
    <button onclick="openChat()">Консультация</button>
    <button onclick="show('form')">Записаться</button>
    <button onclick="show('contacts')">Контакты</button>
    <button onclick="show('faq')">FAQ</button>
  </div>
</div>

<div id="form" style="display:none;">
  <h2>Записаться</h2>

  <input class="input" id="name" placeholder="Имя">
  <input class="input" id="contact" placeholder="Telegram или номер">

  <select class="input select" id="training">
    <option>Пилатес</option>
    <option>Стретчинг</option>
    <option>Акро</option>
  </select>

  <select class="input select" id="type">
    <option>Онлайн</option>
    <option>Оффлайн</option>
  </select>

  <!-- ДЕНЬ -->
  <div class="input fake" onclick="openDate()">
    <span id="dateText">Выберите день</span>
  </div>

  <!-- ВРЕМЯ -->
  <div class="input fake" onclick="openTime()">
    <span id="timeText">Выберите время</span>
  </div>

  <!-- скрытые реальные -->
  <input type="date" id="date" class="hidden">
  <input type="time" id="time" class="hidden">

  <button class="full" onclick="sendData()">Отправить</button>
  <button class="full" onclick="back()">Назад</button>

  <div class="note">После отправления заявки с Вами свяжутся!</div>
</div>

<div id="contacts" style="display:none;">
  <h2>Контакты</h2>

  <button class="full" onclick="openLink('https://t.me/niginacoach')">Telegram</button>
  <button class="full" onclick="openLink('https://www.instagram.com/nigina.coach')">Instagram</button>

  <button class="full" onclick="back()">Назад</button>
</div>

<div id="faq" style="display:none;">
  <h2>FAQ</h2>
  <div class="note">Скоро будет информация</div>
  <button class="full" onclick="back()">Назад</button>
</div>

</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

function show(id) {
  document.getElementById("menu").style.display = "none";
  document.getElementById(id).style.display = "block";
}

function back() {
  document.getElementById("menu").style.display = "block";
  document.getElementById("form").style.display = "none";
  document.getElementById("contacts").style.display = "none";
  document.getElementById("faq").style.display = "none";
}

function openChat() {
  window.open("https://t.me/niginacoach");
}

function openLink(url) {
  window.open(url);
}

/* теперь работает */
function openDate() {
  document.getElementById("date").focus();
  document.getElementById("date").click();
}

function openTime() {
  document.getElementById("time").focus();
  document.getElementById("time").click();
}

document.getElementById("date").addEventListener("change", function() {
  if (this.value) {
    document.getElementById("dateText").innerText = this.value;
  }
});

document.getElementById("time").addEventListener("change", function() {
  if (this.value) {
    document.getElementById("timeText").innerText = this.value;
  }
});

function sendData() {
  const name = document.getElementById("name").value;
  const contact = document.getElementById("contact").value;
  const training = document.getElementById("training").value;
  const type = document.getElementById("type").value;
  const date = document.getElementById("date").value;
  const time = document.getElementById("time").value;

  const text =
`Новая заявка:
Имя: ${name}
Контакт: ${contact}
Тренировка: ${training}
Тип: ${type}
Дата: ${date}
Время: ${time}`;

  window.open(`https://t.me/timurfaizievvv?text=${encodeURIComponent(text)}`);
}
</script>

</body>
</html>
