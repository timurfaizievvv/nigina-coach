<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini App</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0f0f0f;
  color: white;
}

.container {
  padding: 16px;
  max-width: 500px;
  margin: auto;
}

@media (max-width: 600px) {
  .container {
    padding: 16px 14px;
  }
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

button {
  padding: 18px;
  border: none;
  border-radius: 16px;
  background: #1f1f1f;
  color: white;
  font-size: 16px;
  transition: 0.2s;
}

button:active {
  background: #007b0e;
  transform: scale(0.97);
}

input, select {
  width: 100%;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 12px;
  border: none;
  background: #1a1a1a;
  color: white;
  font-size: 16px;

  appearance: none;
  -webkit-appearance: none;
}

select {
  background-image: linear-gradient(45deg, transparent 50%, white 50%),
                    linear-gradient(135deg, white 50%, transparent 50%);
  background-position: calc(100% - 20px) calc(50% - 3px),
                       calc(100% - 15px) calc(50% - 3px);
  background-size: 5px 5px, 5px 5px;
  background-repeat: no-repeat;
}

/* 🔥 КАСТОМ ПОЛЯ ДАТЫ/ВРЕМЕНИ */
.fake-input {
  width: 100%;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 12px;
  background: #1a1a1a;
  color: #aaa;
}

.full {
  width: 100%;
  margin-top: 10px;
}

.card {
  margin-bottom: 12px;
}
</style>
</head>

<body>
<div class="container">

<div id="menu">
  <h2>Меню</h2>

  <div class="grid">
    <button onclick="show('schedule')">Расписание</button>
    <button onclick="openChat()">Консультация</button>
    <button onclick="show('contacts')">Контакты</button>
    <button onclick="show('form')">Записаться</button>
  </div>
</div>

<div id="schedule" style="display:none;">
  <h2>Расписание</h2>
  <div class="card">Здесь будет календарь</div>
  <button class="full" onclick="back()">Назад</button>
</div>

<div id="contacts" style="display:none;">
  <h2>Контакты</h2>

  <button class="full" onclick="openLink('https://www.instagram.com/nigina.coach')">Instagram</button>
  <button class="full" onclick="openLink('https://t.me/niginacoach')">Telegram</button>
  <button class="full" onclick="openLink('mailto:niginacoach@gmail.com')">Gmail</button>

  <button class="full" onclick="back()">Назад</button>
</div>

<div id="form" style="display:none;">
  <h2>Записаться</h2>

  <input id="name" placeholder="Имя">

  <!-- 🔥 ТЕПЕРЬ СРАЗУ TELEGRAM -->
  <input id="username" placeholder="Ваш Telegram (@username)">

  <select id="training">
    <option>Пилатес</option>
    <option>Стретчинг</option>
    <option>Акро</option>
  </select>

  <select id="type">
    <option>Оффлайн</option>
    <option>Онлайн</option>
  </select>

  <!-- КАСТОМ ДАТА -->
  <div class="fake-input" onclick="openDate()">
    <span id="dateText">Выберите день</span>
  </div>

  <!-- КАСТОМ ВРЕМЯ -->
  <div class="fake-input" onclick="openTime()">
    <span id="timeText">Выберите время</span>
  </div>

  <!-- СКРЫТЫЕ -->
  <input type="date" id="date" style="display:none;">
  <input type="time" id="time" style="display:none;">

  <button class="full" onclick="sendData()">Отправить</button>
  <button class="full" onclick="back()">Назад</button>
</div>

</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

function show(id) {
  document.getElementById("menu").style.display = "none";
  document.getElementById(id).style.display = "block";
}

function back() {
  document.getElementById("menu").style.display = "block";
  document.getElementById("schedule").style.display = "none";
  document.getElementById("contacts").style.display = "none";
  document.getElementById("form").style.display = "none";
}

function openChat() {
  window.open("https://t.me/niginacoach", "_blank");
}

function openLink(url) {
  window.open(url, "_blank");
}

/* 📅 */
function openDate() {
  document.getElementById("date").showPicker();
}

function openTime() {
  document.getElementById("time").showPicker();
}

document.getElementById("date").addEventListener("change", function() {
  if (this.value) {
    document.getElementById("dateText").innerText = this.value;
  }
});

document.getElementById("time").addEventListener("change", function() {
  if (this.value) {
    document.getElementById("timeText").innerText = this.value;
  }
});

function sendData() {
  const name = document.getElementById("name").value;
  const training = document.getElementById("training").value;
  const type = document.getElementById("type").value;
  const date = document.getElementById("date").value;
  const time = document.getElementById("time").value;
  const username = document.getElementById("username").value;

  const text =
`Новая заявка:
Имя: ${name}
Тренировка: ${training}
Тип: ${type}
Дата: ${date}
Время: ${time}
Telegram: ${username}`;

  const url = `https://t.me/timurfaizievvv?text=${encodeURIComponent(text)}`;
  window.open(url, "_blank");
}
</script>

</body>
</html>
