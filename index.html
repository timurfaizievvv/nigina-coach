<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<title>Mini App</title>

<style>
:root {
  --bg: #0f0f10;
  --card: #1c1c1e;
  --text: #ffffff;
  --sub: #8e8e93;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  padding: 20px;
}

.screen { display: none; }
.active { display: block; }

.title {
  text-align: center;
  font-size: 20px;
  margin-bottom: 25px;
  font-weight: 600;
}

.block {
  background: var(--card);
  padding: 14px;
  border-radius: 12px;
  margin-bottom: 12px;
  position: relative;
}

input, select {
  width: 100%;
  background: transparent;
  border: none;
  color: var(--text);
  font-size: 15px;
  outline: none;
}

/* стрелка */
.select-wrap {
  position: relative;
}
.select-wrap::after {
  content: "▾";
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: #8e8e93;
}

/* кнопки */
button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-size: 15px;
  margin-top: 10px;
}

.primary {
  background: white;
  color: black;
}

.disabled {
  background: #2c2c2e;
  color: #6b6b6b;
}

.secondary {
  background: transparent;
  border: 1px solid #2c2c2e;
  color: white;
}

.note {
  font-size: 12px;
  color: var(--sub);
  text-align: center;
  margin-top: 8px;
}

.menu-btn {
  background: var(--card);
  padding: 16px;
  border-radius: 12px;
  text-align: center;
  margin-bottom: 12px;
}

.spacer { height: 20px; }

.value {
  font-size: 14px;
  color: #8e8e93;
}
</style>
</head>

<body>

<!-- ГЛАВНАЯ -->
<div id="home" class="screen active">
  <div class="title">Главная страница</div>

  <div class="menu-btn" onclick="openScreen('form')">Записаться</div>
  <div class="menu-btn" onclick="openScreen('faq')">FAQ</div>

  <div class="menu-btn" onclick="openConsult()">Консультация</div>
  <div class="note">Если Вы не нашли ответ на вопрос в разделе FAQ, напишите мне</div>

  <div class="spacer"></div>

  <div class="menu-btn" onclick="openInstagram()">Instagram</div>
</div>

<!-- ФОРМА -->
<div id="form" class="screen">
  <div class="title">Форма заполнения заявки</div>

  <div class="block">
    <input id="name" placeholder="Введите имя">
  </div>

  <div class="block">
    <input id="contact" placeholder="Введите контакты">
  </div>

  <div class="block select-wrap">
    <select id="training">
      <option value="">Выберите тренировку</option>
      <option>Пилатес</option>
      <option>Акро</option>
      <option>Стретчинг</option>
    </select>
  </div>

  <div class="block select-wrap">
    <select id="format">
      <option value="">Формат тренировки</option>
      <option>Онлайн</option>
      <option>Оффлайн</option>
      <option>Выезд на дому</option>
    </select>
  </div>

  <!-- ДАТА -->
  <div class="block" onclick="openDatePicker()">
    <input type="date" id="date" style="opacity:0; position:absolute;">
    <div id="dateText" class="value">Выберите дату</div>
  </div>

  <!-- ВРЕМЯ -->
  <div class="block" onclick="openTimePicker()">
    <input type="time" id="time" style="opacity:0; position:absolute;">
    <div id="timeText" class="value">Выберите время</div>
  </div>

  <div class="spacer"></div>

  <button id="submitBtn" class="disabled" onclick="sendForm()">Заполните форму</button>

  <button class="secondary" onclick="openScreen('home')">Назад</button>

  <div class="note">
    С Вами свяжутся после проверки Вашей заявки.
  </div>
</div>

<!-- FAQ -->
<div id="faq" class="screen">
  <div class="title">FAQ</div>

  <div class="note" style="margin-top:20px;">
    В ближайшее время тут будут ответы на вопросы
  </div>

  <button class="secondary" onclick="openScreen('home')" style="margin-top:20px;">Назад</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

/* НАВИГАЦИЯ */
function openScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function openConsult() {
  window.open("https://t.me/niginacoach", "_blank");
}

function openInstagram() {
  window.open("https://www.instagram.com/nigina.coach", "_blank");
}

/* ФИКС iOS */
function openDatePicker() {
  const input = document.getElementById("date");
  if (input.showPicker) input.showPicker();
  else input.focus();
}

function openTimePicker() {
  const input = document.getElementById("time");
  if (input.showPicker) input.showPicker();
  else input.focus();
}

/* ДАТА */
const dateInput = document.getElementById("date");
dateInput.addEventListener("change", () => {
  if (!dateInput.value) return;

  const d = new Date(dateInput.value);
  const text = d.toLocaleDateString("ru-RU", {
    day: "numeric",
    month: "long",
    year: "numeric"
  });

  dateText.innerText = text;
  dateText.style.color = "white";

  validate();
});

/* ВРЕМЯ */
const timeInput = document.getElementById("time");
timeInput.addEventListener("change", () => {
  if (!timeInput.value) return;

  timeText.innerText = timeInput.value;
  timeText.style.color = "white";

  validate();
});

/* ВАЛИДАЦИЯ */
function validate() {
  const filled =
    name.value &&
    contact.value &&
    training.value &&
    format.value &&
    date.value &&
    time.value;

  const btn = document.getElementById("submitBtn");

  if (filled) {
    btn.classList.remove("disabled");
    btn.classList.add("primary");
    btn.innerText = "Отправить";
  } else {
    btn.classList.remove("primary");
    btn.classList.add("disabled");
    btn.innerText = "Заполните форму";
  }
}

/* ОТПРАВКА */
function sendForm() {
  if (submitBtn.classList.contains("disabled")) return;

  const data = {
    name: name.value,
    contact: contact.value,
    training: training.value,
    format: format.value,
    date: dateText.innerText,
    time: timeText.innerText
  };

  tg.sendData(JSON.stringify(data));
}
</script>

</body>
</html>
