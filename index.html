<!DOCTYPE html>
<html>
<head>
  <title>Mini App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body style="font-family:sans-serif; text-align:center; padding:20px;">

  <h2>Меню</h2>

  <div id="menu">
    <button onclick="show('schedule')">📅 Расписание</button><br><br>
    <button onclick="openChat()">💬 Консультация</button><br><br>
    <button onclick="show('contacts')">📲 Контакты</button><br><br>
    <button onclick="show('form')">📝 Записаться</button>
  </div>

  <!-- Расписание -->
  <div id="schedule" style="display:none;">
    <h3>Расписание</h3>
    <p>Здесь будет календарь (пока заглушка)</p>
    <button onclick="back()">Назад</button>
  </div>

  <!-- Контакты -->
  <div id="contacts" style="display:none;">
    <h3>Контакты</h3>
    <p>
      📩 Email: niginacoach@gmail.com<br>
      📸 Instagram: <a href="https://instagram.com/nigina.coach">Открыть</a><br>
      💬 Telegram: <a href="https://t.me/niginacoach">Написать</a>
    </p>
    <button onclick="back()">Назад</button>
  </div>

  <!-- Форма -->
  <div id="form" style="display:none;">
    <h3>Запись</h3>

    <input id="name" placeholder="Имя"><br><br>
    <input id="phone" placeholder="Телефон"><br><br>

    <button onclick="sendData()">Отправить</button><br><br>
    <button onclick="back()">Назад</button>
  </div>

  <script>
    const tg = window.Telegram.WebApp;

    function show(id) {
      document.getElementById("menu").style.display = "none";
      document.getElementById(id).style.display = "block";
    }

    function back() {
      document.getElementById("menu").style.display = "block";
      document.getElementById("schedule").style.display = "none";
      document.getElementById("contacts").style.display = "none";
      document.getElementById("form").style.display = "none";
    }

    function openChat() {
      window.open("https://t.me/niginacoach", "_blank");
    }

    function sendData() {
      const name = document.getElementById("name").value;
      const phone = document.getElementById("phone").value;

      tg.sendData(JSON.stringify({
        name: name,
        phone: phone
      }));

      alert("Заявка отправлена!");
    }
  </script>

</body>
</html>
