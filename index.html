<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini App</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: #0f0f0f;
  color: white;
}

.container {
  padding: 16px;
  max-width: 500px;
  margin: auto;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
  font-size: 18px;
}

.block {
  width: 100%;
  height: 60px;
  border-radius: 14px;
  background: #1f1f1f;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 12px;
  font-size: 15px;
  cursor: pointer;
  transition: 0.2s;
}

.block:active {
  background: #007b0e;
}

.sub {
  text-align: center;
  color: #888;
  font-size: 13px;
  margin-top: -6px;
  margin-bottom: 12px;
}

.input {
  width: 100%;
  height: 50px;
  padding: 0 12px;
  border-radius: 12px;
  border: none;
  background: #1a1a1a;
  color: white;
  font-size: 15px;
  margin-bottom: 12px;
}

.select-wrap {
  position: relative;
  margin-bottom: 12px;
}

.select {
  appearance: none;
  -webkit-appearance: none;
  color: #888;
}

.select-wrap::after {
  content: "";
  position: absolute;
  right: 14px;
  top: 50%;
  width: 6px;
  height: 6px;
  border-right: 2px solid #888;
  border-bottom: 2px solid #888;
  transform: translateY(-50%) rotate(45deg);
  pointer-events: none;
}

.select.filled {
  color: white;
}

.hidden {
  position: absolute;
  opacity: 0;
  width: 100%;
  height: 50px;
  left: 0;
}

.fake {
  display: flex;
  align-items: center;
  color: #aaa;
  margin-bottom: 12px;
}

.full {
  width: 100%;
  height: 50px;
  margin-top: 10px;
  border-radius: 12px;
  background: #1f1f1f;
  color: white;
  border: none;
  font-size: 15px;
  transition: 0.2s;
}

.full:active {
  background: #007b0e;
}

.full.disabled {
  opacity: 0.4;
  pointer-events: none;
}

.note {
  margin-top: 10px;
  color: #888;
  font-size: 13px;
  text-align: center;
}
</style>
</head>

<body>
<div class="container">

<div id="menu">
  <h2>Меню</h2>

  <div class="block" onclick="show('form')">Записаться</div>
  <div class="block" onclick="show('faq')">FAQ</div>
  <div class="block" onclick="openChat()">Консультация</div>

  <div class="sub">Если Вы не нашли ответ в разделе FAQ, напишите мне</div>

  <div style="height:20px;"></div>

  <div class="block" onclick="openInstagram()">Instagram</div>
</div>

<div id="form" style="display:none;">
  <h2>Записаться</h2>

  <input class="input" id="name" placeholder="Имя">
  <input class="input" id="contact" placeholder="Telegram или номер">

  <div class="select-wrap">
    <select class="input select" id="training">
      <option value="" disabled selected>Тренировка</option>
      <option>Пилатес</option>
      <option>Стретчинг</option>
      <option>Акро</option>
    </select>
  </div>

  <div class="select-wrap">
    <select class="input select" id="type">
      <option value="" disabled selected>Тип</option>
      <option>Онлайн</option>
      <option>Оффлайн</option>
    </select>
  </div>

  <div class="input fake" onclick="openDate()">
    <span id="dateText">Выберите день</span>
  </div>

  <div class="input fake" onclick="openTime()">
    <span id="timeText">Выберите время</span>
  </div>

  <input type="date" id="date" class="hidden">
  <input type="time" id="time" class="hidden">

  <button id="submitBtn" class="full disabled">Отправить</button>
  <button class="full" onclick="back()">Назад</button>

  <div class="note">После отправления заявки с Вами свяжутся!</div>
</div>

<div id="faq" style="display:none;">
  <h2>FAQ</h2>
  <div class="note">Скоро будет информация</div>
  <button class="full" onclick="back()">Назад</button>
</div>

</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

// элементы
const nameInput = document.getElementById("name");
const contactInput = document.getElementById("contact");
const trainingSelect = document.getElementById("training");
const typeSelect = document.getElementById("type");
const dateInput = document.getElementById("date");
const timeInput = document.getElementById("time");
const submitBtn = document.getElementById("submitBtn");
const dateText = document.getElementById("dateText");
const timeText = document.getElementById("timeText");

// навигация
function show(id){
  tg.HapticFeedback.impactOccurred("light");
  document.getElementById("menu").style.display="none";
  document.getElementById(id).style.display="block";
}

function back(){
  tg.HapticFeedback.impactOccurred("light");
  document.getElementById("menu").style.display="block";
  document.getElementById("form").style.display="none";
  document.getElementById("faq").style.display="none";
}

// ссылки
function openChat(){ tg.openTelegramLink("https://t.me/niginacoach"); }
function openInstagram(){ window.open("https://www.instagram.com/nigina.coach"); }

// дата/время
function openDate(){ dateInput.click(); }
function openTime(){ timeInput.click(); }

trainingSelect.addEventListener("change", handleSelect);
typeSelect.addEventListener("change", handleSelect);

function handleSelect(e){
  const el = e.target;
  if(el.value){
    el.classList.add("filled");
  } else {
    el.classList.remove("filled");
  }
  checkForm();
}

dateInput.addEventListener("change", function(){
  if(this.value){
    const d=new Date(this.value);
    const months=["января","февраля","марта","апреля","мая","июня","июля","августа","сентября","октября","ноября","декабря"];
    dateText.innerText=`${d.getDate()} ${months[d.getMonth()]}`;
    checkForm();
  }
});

timeInput.addEventListener("change", function(){
  if(this.value){
    timeText.innerText=this.value;
    checkForm();
  }
});

// валидация
function checkForm(){
  const contactValid = contactInput.value.length >= 5;

  const valid =
    nameInput.value &&
    contactValid &&
    trainingSelect.value &&
    typeSelect.value &&
    dateInput.value &&
    timeInput.value;

  submitBtn.classList.toggle("disabled", !valid);
}

// события input
[nameInput, contactInput].forEach(el=>{
  el.addEventListener("input", checkForm);
});

// отправка
submitBtn.addEventListener("click", sendData);

function sendData(){
  if(submitBtn.classList.contains("disabled")) return;

  const data = {
    name: nameInput.value,
    contact: contactInput.value,
    training: trainingSelect.value,
    type: typeSelect.value,
    date: dateText.innerText,
    time: timeText.innerText
  };

  try {
    tg.sendData(JSON.stringify(data));
  } catch(e){
    const text =
`Новая заявка:
Имя: ${data.name}
Контакт: ${data.contact}
Тренировка: ${data.training}
Тип: ${data.type}
Дата: ${data.date}
Время: ${data.time}`;

    tg.openTelegramLink(`https://t.me/timurfaizievvv?text=${encodeURIComponent(text)}`);
  }

  resetForm();
}

// reset
function resetForm(){
  nameInput.value = "";
  contactInput.value = "";
  trainingSelect.value = "";
  typeSelect.value = "";
  dateInput.value = "";
  timeInput.value = "";

  trainingSelect.classList.remove("filled");
  typeSelect.classList.remove("filled");

  dateText.innerText = "Выберите день";
  timeText.innerText = "Выберите время";

  submitBtn.classList.add("disabled");
}
</script>

</body>
</html>
