<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini App</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: #0f0f0f;
  color: white;
}

.container {
  padding: 16px;
  max-width: 500px;
  margin: auto;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

button {
  padding: 18px;
  border-radius: 16px;
  border: none;
  background: #1f1f1f;
  color: white;
  font-size: 16px;
}

button:active {
  background: #007b0e;
}

input, select {
  width: 100%;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 12px;
  border: none;
  background: #1a1a1a;
  color: white;
}

/* 🔥 3 в ряд */
.row3 {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  margin-bottom: 12px;
}

/* слоты */
.slots {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.slot {
  padding: 12px;
  text-align: center;
  border-radius: 10px;
  background: #1f1f1f;
}

.slot.disabled {
  opacity: 0.4;
}

.full {
  width: 100%;
  margin-top: 10px;
}
</style>
</head>

<body>
<div class="container">

<div id="menu">
  <h2>Меню</h2>
  <div class="grid">
    <button onclick="show('schedule')">Расписание</button>
    <button onclick="openChat()">Консультация</button>
    <button onclick="show('contacts')">Контакты</button>
    <button onclick="show('form')">Записаться</button>
  </div>
</div>

<div id="schedule" style="display:none;">
  <h2>Расписание</h2>

  <input type="date" id="scheduleDate">

  <div class="slots" id="slots"></div>

  <button class="full" onclick="back()">Назад</button>
</div>

<div id="contacts" style="display:none;">
  <h2>Контакты</h2>
  <button class="full" onclick="openLink('https://www.instagram.com/nigina.coach')">Instagram</button>
  <button class="full" onclick="openLink('https://t.me/niginacoach')">Telegram</button>
  <button class="full" onclick="openLink('mailto:niginacoach@gmail.com')">Gmail</button>
  <button class="full" onclick="back()">Назад</button>
</div>

<div id="form" style="display:none;">
  <h2>Записаться</h2>

  <input id="name" placeholder="Имя">
  <input id="username" placeholder="Ваш Telegram (@username)">

  <select id="training">
    <option>Пилатес</option>
    <option>Стретчинг</option>
    <option>Акро</option>
  </select>

  <select id="type">
    <option>Оффлайн</option>
    <option>Онлайн</option>
  </select>

  <!-- 🔥 НОВЫЙ ВЫБОР -->
  <div class="row3">
    <select id="month"></select>
    <select id="day"></select>
    <select id="time"></select>
  </div>

  <button class="full" onclick="sendData()">Отправить</button>
  <button class="full" onclick="back()">Назад</button>
</div>

</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const TIMES = ["12:00","13:00","14:00","15:00","16:00","17:00","18:00"];
const MONTHS = ["01","02","03","04","05","06","07","08","09","10","11","12"];

function show(id) {
  document.getElementById("menu").style.display = "none";
  document.getElementById(id).style.display = "block";
}

function back() {
  document.getElementById("menu").style.display = "block";
  document.getElementById("schedule").style.display = "none";
  document.getElementById("contacts").style.display = "none";
  document.getElementById("form").style.display = "none";
}

function openChat() { window.open("https://t.me/niginacoach"); }
function openLink(url) { window.open(url); }

/* заполнение селектов */
const monthEl = document.getElementById("month");
const dayEl = document.getElementById("day");
const timeEl = document.getElementById("time");

MONTHS.forEach(m => {
  const opt = document.createElement("option");
  opt.value = m;
  opt.text = m;
  monthEl.appendChild(opt);
});

for(let i=1;i<=31;i++){
  const d = i.toString().padStart(2,"0");
  const opt = document.createElement("option");
  opt.value = d;
  opt.text = d;
  dayEl.appendChild(opt);
}

TIMES.forEach(t=>{
  const opt = document.createElement("option");
  opt.value = t;
  opt.text = t;
  timeEl.appendChild(opt);
});

/* storage */
function getBusy(){
  return JSON.parse(localStorage.getItem("busy")||"{}");
}
function saveBusy(d){
  localStorage.setItem("busy",JSON.stringify(d));
}

/* расписание */
document.getElementById("scheduleDate").addEventListener("change",function(){
  const date=this.value;
  const busy=getBusy();
  const container=document.getElementById("slots");
  container.innerHTML="";

  TIMES.forEach(time=>{
    const div=document.createElement("div");
    div.className="slot";
    div.innerText=time;

    if(busy[date]?.includes(time)){
      div.classList.add("disabled");
    } else {
      div.onclick=()=>{
        const [y,m,d]=date.split("-");
        monthEl.value=m;
        dayEl.value=d;
        timeEl.value=time;
        show("form");
      }
    }

    container.appendChild(div);
  });
});

/* отправка */
function sendData(){
  const name=document.getElementById("name").value;
  const username=document.getElementById("username").value;
  const training=document.getElementById("training").value;
  const type=document.getElementById("type").value;

  const month=monthEl.value;
  const day=dayEl.value;
  const time=timeEl.value;

  const year=new Date().getFullYear();
  const date=`${year}-${month}-${day}`;

  const busy=getBusy();
  if(!busy[date]) busy[date]=[];
  busy[date].push(time);
  saveBusy(busy);

  const text=`Новая заявка:
Имя: ${name}
Тренировка: ${training}
Тип: ${type}
Дата: ${date}
Время: ${time}
Telegram: ${username}`;

  window.open(`https://t.me/timurfaizievvv?text=${encodeURIComponent(text)}`);
}
</script>

</body>
</html>
