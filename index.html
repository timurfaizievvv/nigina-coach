<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini App</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: #0f0f0f;
  color: white;
}

.container {
  padding: 16px;
  max-width: 500px;
  margin: auto;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
  font-size: 18px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

/* КНОПКИ */
button {
  height: 60px;
  border-radius: 14px;
  border: none;
  background: #1f1f1f;
  color: white;
  font-size: 15px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

button:active {
  background: #007b0e;
  transform: scale(0.97);
}

/* АНИМАЦИЯ INSTAGRAM */
.instagram {
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(0,123,14,0.4); }
  70% { box-shadow: 0 0 0 10px rgba(0,123,14,0); }
  100% { box-shadow: 0 0 0 0 rgba(0,123,14,0); }
}

/* ПОЛЯ */
.input {
  height: 50px;
  width: 100%;
  padding: 0 12px;
  margin-bottom: 12px;
  border-radius: 12px;
  border: none;
  background: #1a1a1a;
  color: white;
  font-size: 15px;
}

/* SELECT */
.select {
  appearance: none;
  background-image: url("data:image/svg+xml;utf8,<svg fill='gray' height='10' viewBox='0 0 24 24' width='10'><path d='M7 10l5 5 5-5z'/></svg>");
  background-repeat: no-repeat;
  background-position: right 12px center;
}

/* FAKE */
.fake {
  display: flex;
  align-items: center;
  color: #aaa;
}

/* скрытые */
.hidden {
  position: absolute;
  opacity: 0;
}

/* кнопки */
.full {
  width: 100%;
  height: 50px;
  margin-top: 10px;
}

.note {
  margin-top: 10px;
  color: #888;
  font-size: 13px;
  text-align: center;
}

/* SVG */
.icon {
  width: 18px;
  height: 18px;
  fill: #888;
}
</style>
</head>

<body>
<div class="container">

<div id="menu">
  <h2>Меню</h2>

  <div class="grid">

    <button onclick="openChat()">
      <svg class="icon" viewBox="0 0 24 24"><path d="M4 4h16v12H5.17L4 17.17V4z"/></svg>
      Консультация
    </button>

    <button onclick="show('form')">
      <svg class="icon" viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm10 8h8v-6h-8v6zm0-18v6h8V3h-8zM3 21h8v-6H3v6z"/></svg>
      Записаться
    </button>

    <button class="instagram" onclick="openInstagram()">
      <svg class="icon" viewBox="0 0 24 24"><path d="M7 2C4 2 2 4 2 7v10c0 3 2 5 5 5h10c3 0 5-2 5-5V7c0-3-2-5-5-5H7zm5 4a6 6 0 110 12 6 6 0 010-12zm0 2a4 4 0 100 8 4 4 0 000-8zm5.5-.75a1.25 1.25 0 110 2.5 1.25 1.25 0 010-2.5z"/></svg>
      Следите за мной
    </button>

    <button onclick="show('faq')">
      <svg class="icon" viewBox="0 0 24 24"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92A1.49 1.49 0 0013.5 14h-2v-.5c0-.83.34-1.58.88-2.12l1.24-1.26A2 2 0 0012 6a2 2 0 00-2 2H8a4 4 0 118 0c0 .88-.36 1.68-.93 2.25z"/></svg>
      FAQ
    </button>

  </div>
</div>

<div id="form" style="display:none;">
  <h2>Записаться</h2>

  <input class="input" id="name" placeholder="Имя">
  <input class="input" id="contact" placeholder="Telegram или номер">

  <select class="input select" id="training">
    <option>Пилатес</option>
    <option>Стретчинг</option>
    <option>Акро</option>
  </select>

  <select class="input select" id="type">
    <option>Онлайн</option>
    <option>Оффлайн</option>
  </select>

  <div class="input fake" onclick="openDate()">
    <span id="dateText">Выберите день</span>
  </div>

  <div class="input fake" onclick="openTime()">
    <span id="timeText">Выберите время</span>
  </div>

  <input type="date" id="date" class="hidden">
  <input type="time" id="time" class="hidden">

  <button class="full" onclick="sendData()">Отправить</button>
  <button class="full" onclick="back()">Назад</button>

  <div class="note">После отправления заявки с Вами свяжутся!</div>
</div>

<div id="faq" style="display:none;">
  <h2>FAQ</h2>
  <div class="note">Скоро будет информация</div>
  <button class="full" onclick="back()">Назад</button>
</div>

</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

function show(id){
  document.getElementById("menu").style.display="none";
  document.getElementById(id).style.display="block";
}

function back(){
  document.getElementById("menu").style.display="block";
  document.getElementById("form").style.display="none";
  document.getElementById("faq").style.display="none";
}

function openChat(){ window.open("https://t.me/niginacoach"); }
function openInstagram(){ window.open("https://www.instagram.com/nigina.coach"); }

function openDate(){ document.getElementById("date").click(); }
function openTime(){ document.getElementById("time").click(); }

/* формат даты */
const months=["января","февраля","марта","апреля","мая","июня","июля","августа","сентября","октября","ноября","декабря"];

document.getElementById("date").addEventListener("change",function(){
  if(this.value){
    const d=new Date(this.value);
    const text=`${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
    document.getElementById("dateText").innerText=text;
  }
});

document.getElementById("time").addEventListener("change",function(){
  if(this.value){
    document.getElementById("timeText").innerText=this.value;
  }
});

function sendData(){
  const name=nameEl.value;
  const contact=contactEl.value;
  const training=trainingEl.value;
  const type=typeEl.value;
  const date=dateEl.value;
  const time=timeEl.value;

  const text=`Новая заявка:
Имя: ${name}
Контакт: ${contact}
Тренировка: ${training}
Тип: ${type}
Дата: ${date}
Время: ${time}`;

  window.open(`https://t.me/timurfaizievvv?text=${encodeURIComponent(text)}`);
}

const nameEl=document.getElementById("name");
const contactEl=document.getElementById("contact");
const trainingEl=document.getElementById("training");
const typeEl=document.getElementById("type");
const dateEl=document.getElementById("date");
const timeEl=document.getElementById("time");
</script>

</body>
</html>
