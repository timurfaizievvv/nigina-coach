<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini App</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: #0f0f0f;
  color: white;
}

.container {
  padding: 16px;
  max-width: 500px;
  margin: auto;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
  font-size: 18px;
}

.block {
  width: 100%;
  height: 60px;
  border-radius: 14px;
  background: #1f1f1f;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 12px;
  font-size: 15px;
}

.block:active {
  background: #007b0e;
}

.sub {
  text-align: center;
  color: #888;
  font-size: 13px;
  margin-top: -6px;
  margin-bottom: 12px;
}

.input {
  width: 100%;
  height: 50px;
  padding: 0 12px;
  margin-bottom: 12px;
  border-radius: 12px;
  border: none;
  background: #1a1a1a;
  color: white;
  font-size: 15px;
}

.select {
  appearance: none;
  background-image: url("data:image/svg+xml;utf8,<svg stroke='gray' fill='none' stroke-width='2' viewBox='0 0 24 24' width='12'><polyline points='6 9 12 15 18 9'/></svg>");
  background-repeat: no-repeat;
  background-position: right 12px center;
}

/* 🔥 фикс клика */
.hidden {
  position: absolute;
  opacity: 0;
  width: 100%;
  height: 50px;
  left: 0;
}

.fake {
  display: flex;
  align-items: center;
  color: #aaa;
}

.full {
  width: 100%;
  height: 50px;
  margin-top: 10px;
  border-radius: 12px;
  background: #1f1f1f;
  color: white;
  border: none;
  font-size: 15px;
}

.full:active {
  background: #007b0e;
}

.note {
  margin-top: 10px;
  color: #888;
  font-size: 13px;
  text-align: center;
}
</style>
</head>

<body>
<div class="container">

<div id="menu">
  <h2>Меню</h2>

  <div class="block" onclick="show('form')">Записаться</div>
  <div class="block" onclick="show('faq')">FAQ</div>
  <div class="block" onclick="openChat()">Консультация</div>

  <div class="sub">Если Вы не нашли ответ в разделе FAQ, напишите мне</div>

  <div style="height:20px;"></div>

  <div class="block" onclick="openInstagram()">Instagram</div>
</div>

<div id="form" style="display:none;">
  <h2>Записаться</h2>

  <input class="input" id="name" placeholder="Имя">
  <input class="input" id="contact" placeholder="Telegram или номер">

  <select class="input select" id="training">
    <option value="">Тренировка</option>
    <option>Пилатес</option>
    <option>Стретчинг</option>
    <option>Акро</option>
  </select>

  <select class="input select" id="type">
    <option value="">Тип</option>
    <option>Онлайн</option>
    <option>Оффлайн</option>
  </select>

  <div class="input fake" onclick="openDate()">
    <span id="dateText">Выберите день</span>
  </div>

  <div class="input fake" onclick="openTime()">
    <span id="timeText">Выберите время</span>
  </div>

  <input type="date" id="date" class="hidden">
  <input type="time" id="time" class="hidden">

  <button class="full" onclick="sendData()">Отправить</button>
  <button class="full" onclick="back()">Назад</button>

  <div class="note">После отправления заявки с Вами свяжутся!</div>
</div>

<div id="faq" style="display:none;">
  <h2>FAQ</h2>
  <div class="note">Скоро будет информация</div>
  <button class="full" onclick="back()">Назад</button>
</div>

</div>

<script>
const tg = window.Telegram.WebApp;

tg.ready();
tg.expand();

/* навигация */
function show(id){
  document.getElementById("menu").style.display="none";
  document.getElementById(id).style.display="block";
}

function back(){
  document.getElementById("menu").style.display="block";
  document.getElementById("form").style.display="none";
  document.getElementById("faq").style.display="none";
}

function openChat(){ window.open("https://t.me/niginacoach"); }
function openInstagram(){ window.open("https://www.instagram.com/nigina.coach"); }

function openDate(){
  const el=document.getElementById("date");
  el.focus();
  el.click();
}

function openTime(){
  const el=document.getElementById("time");
  el.focus();
  el.click();
}

/* формат даты */
document.getElementById("date").addEventListener("change",function(){
  if(this.value){
    const d=new Date(this.value);
    const months=["января","февраля","марта","апреля","мая","июня","июля","августа","сентября","октября","ноября","декабря"];
    document.getElementById("dateText").innerText=`${d.getDate()} ${months[d.getMonth()]}`;
  }
});

document.getElementById("time").addEventListener("change",function(){
  if(this.value){
    document.getElementById("timeText").innerText=this.value;
  }
});

/* отправка */
function sendData(){
  const nameEl = document.getElementById("name");
  const contactEl = document.getElementById("contact");
  const trainingEl = document.getElementById("training");
  const typeEl = document.getElementById("type");
  const dateEl = document.getElementById("date");
  const timeEl = document.getElementById("time");

  if(!nameEl.value || !contactEl.value || !trainingEl.value || !typeEl.value || !dateEl.value || !timeEl.value){
    alert("Заполните все поля");
    return;
  }

  const text =
`Новая заявка:
Имя: ${nameEl.value}
Контакт: ${contactEl.value}
Тренировка: ${trainingEl.value}
Тип: ${typeEl.value}
Дата: ${dateEl.value}
Время: ${timeEl.value}`;

  window.open(`https://t.me/timurfaizievvv?text=${encodeURIComponent(text)}`);
}
</script>

</body>
</html>
