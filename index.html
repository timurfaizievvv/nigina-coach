<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini App</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: #0f0f0f;
  color: white;
}

.container {
  padding: 16px;
  max-width: 500px;
  margin: auto;
}

/* заголовок */
h2 {
  text-align: center;
  margin-bottom: 20px;
  font-size: 18px;
}

/* КНОПКИ 1x1 */
.block {
  width: 100%;
  height: 60px;
  border-radius: 14px;
  background: #1f1f1f;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-bottom: 12px;
  font-size: 15px;
}

.block:active {
  background: #007b0e;
  transform: scale(0.97);
}

/* иконки одинаковые */
.icon {
  width: 18px;
  height: 18px;
  stroke: #888;
  stroke-width: 2;
  fill: none;
}

/* текст под блоком */
.sub {
  text-align: center;
  color: #888;
  font-size: 13px;
  margin-top: -6px;
  margin-bottom: 12px;
}

/* поля */
.input {
  width: 100%;
  height: 50px;
  padding: 0 12px;
  margin-bottom: 12px;
  border-radius: 12px;
  border: none;
  background: #1a1a1a;
  color: white;
  font-size: 15px;
}

/* select */
.select {
  appearance: none;
  background-image: url("data:image/svg+xml;utf8,<svg stroke='gray' fill='none' stroke-width='2' viewBox='0 0 24 24' width='12'><polyline points='6 9 12 15 18 9'/></svg>");
  background-repeat: no-repeat;
  background-position: right 12px center;
}

/* дата/время */
.fake {
  display: flex;
  align-items: center;
  color: #aaa;
}

.hidden {
  position: absolute;
  opacity: 0;
}

/* кнопки */
.full {
  width: 100%;
  height: 50px;
  margin-top: 10px;
}

.note {
  margin-top: 10px;
  color: #888;
  font-size: 13px;
  text-align: center;
}
</style>
</head>

<body>
<div class="container">

<!-- MENU -->
<div id="menu">
  <h2>Меню</h2>

  <div class="block" onclick="show('form')">
    <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    Записаться
  </div>

  <div class="block" onclick="show('faq')">
    <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><line x1="12" y1="17" x2="12" y2="17"/><path d="M9 9a3 3 0 016 0c0 2-3 2-3 4"/></svg>
    FAQ
  </div>

  <div class="block" onclick="openChat()">
    <svg class="icon" viewBox="0 0 24 24"><path d="M4 4h16v12H5l-1 1z"/></svg>
    Консультация
  </div>

  <div class="sub">Если Вы не нашли ответ в разделе FAQ, напишите мне</div>

  <!-- отступ -->
  <div style="height:20px;"></div>

  <div class="block" onclick="openInstagram()">
    <svg class="icon" viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="4"/><circle cx="12" cy="12" r="4"/></svg>
    Instagram
  </div>

</div>

<!-- FORM -->
<div id="form" style="display:none;">
  <h2>Записаться</h2>

  <input class="input" id="name" placeholder="Имя">
  <input class="input" id="contact" placeholder="Telegram или номер">

  <select class="input select" id="training">
    <option>Пилатес</option>
    <option>Стретчинг</option>
    <option>Акро</option>
  </select>

  <select class="input select" id="type">
    <option>Онлайн</option>
    <option>Оффлайн</option>
  </select>

  <div class="input fake" onclick="openDate()">
    <span id="dateText">Выберите день</span>
  </div>

  <div class="input fake" onclick="openTime()">
    <span id="timeText">Выберите время</span>
  </div>

  <input type="date" id="date" class="hidden">
  <input type="time" id="time" class="hidden">

  <button class="full" onclick="sendData()">Отправить</button>
  <button class="full" onclick="back()">Назад</button>

  <div class="note">После отправления заявки с Вами свяжутся!</div>
</div>

<!-- FAQ -->
<div id="faq" style="display:none;">
  <h2>FAQ</h2>
  <div class="note">Скоро будет информация</div>
  <button class="full" onclick="back()">Назад</button>
</div>

</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

function show(id){
  document.getElementById("menu").style.display="none";
  document.getElementById(id).style.display="block";
}

function back(){
  document.getElementById("menu").style.display="block";
  document.getElementById("form").style.display="none";
  document.getElementById("faq").style.display="none";
}

function openChat(){ window.open("https://t.me/niginacoach"); }
function openInstagram(){ window.open("https://www.instagram.com/nigina.coach"); }

/* фикc клика */
function openDate(){
  const el=document.getElementById("date");
  el.focus();
  el.click();
}

function openTime(){
  const el=document.getElementById("time");
  el.focus();
  el.click();
}

/* отображение */
document.getElementById("date").addEventListener("change",function(){
  if(this.value){
    const d=new Date(this.value);
    const months=["января","февраля","марта","апреля","мая","июня","июля","августа","сентября","октября","ноября","декабря"];
    document.getElementById("dateText").innerText=`${d.getDate()} ${months[d.getMonth()]}`;
  }
});

document.getElementById("time").addEventListener("change",function(){
  if(this.value){
    document.getElementById("timeText").innerText=this.value;
  }
});

function sendData(){
  const name=nameEl.value;
  const contact=contactEl.value;
  const training=trainingEl.value;
  const type=typeEl.value;
  const date=dateEl.value;
  const time=timeEl.value;

  const text=`Новая заявка:
Имя: ${name}
Контакт: ${contact}
Тренировка: ${training}
Тип: ${type}
Дата: ${date}
Время: ${time}`;

  window.open(`https://t.me/timurfaizievvv?text=${encodeURIComponent(text)}`);
}

const nameEl=document.getElementById("name");
const contactEl=document.getElementById("contact");
const trainingEl=document.getElementById("training");
const typeEl=document.getElementById("type");
const dateEl=document.getElementById("date");
const timeEl=document.getElementById("time");
</script>

</body>
</html>
